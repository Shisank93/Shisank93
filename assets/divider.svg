<svg width="100%" height="24" viewBox="0 0 1200 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C2FF" stop-opacity="0" />
      <stop offset="15%" stop-color="#00C2FF" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="1" />
      <stop offset="85%" stop-color="#22D3EE" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0" />
    </radialGradient>
    <filter id="blurFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>

  <!-- Glowing background line -->
  <line x1="50" y1="12" x2="1150" y2="12" stroke="url(#lineGrad)" stroke-width="4" filter="url(#blurFilter)" opacity="0.6"/>
  <!-- Sharp foreground line -->
  <line x1="50" y1="12" x2="1150" y2="12" stroke="url(#lineGrad)" stroke-width="1.5" />
  
  <!-- Central Neural Node -->
  <circle cx="600" cy="12" r="10" fill="url(#glow)"/>
  <circle cx="600" cy="12" r="4" fill="#00C2FF"/>
  <circle cx="600" cy="12" r="2" fill="#FFFFFF"/>
  
  <!-- Side accent nodes -->
  <circle cx="300" cy="12" r="2.5" fill="#00C2FF" opacity="0.8"/>
  <circle cx="900" cy="12" r="2.5" fill="#7C3AED" opacity="0.8"/>
</svg>
