<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="avatarBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C2FF" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#22D3EE" />
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#161B22" />
      <stop offset="100%" stop-color="#0D1117" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Outer Ring with Glow -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#avatarBorder)" stroke-width="4" filter="url(#glow)"/>

  <!-- Background Base -->
  <circle cx="100" cy="100" r="92" fill="url(#bgGlow)"/>

  <!-- Neural Net Node Background Graphic -->
  <g opacity="0.3">
    <line x1="40" y1="60" x2="100" y2="40" stroke="#00C2FF" stroke-width="1.5"/>
    <line x1="100" y1="40" x2="160" y2="60" stroke="#7C3AED" stroke-width="1.5"/>
    <line x1="160" y1="60" x2="140" y2="130" stroke="#22D3EE" stroke-width="1.5"/>
    <line x1="40" y1="60" x2="60" y2="130" stroke="#00C2FF" stroke-width="1.5"/>
    <circle cx="40" cy="60" r="4" fill="#00C2FF"/>
    <circle cx="100" cy="40" r="5" fill="#7C3AED"/>
    <circle cx="160" cy="60" r="4" fill="#22D3EE"/>
  </g>

  <!-- AI Engineer Portrait Silhouetted Icon -->
  <g transform="translate(40, 35)">
    <!-- Head & Hair -->
    <path d="M60 25 C40 25 35 40 35 55 C35 70 45 80 60 80 C75 80 85 70 85 55 C85 40 80 25 60 25 Z" fill="#E6EDF3"/>
    <path d="M38 48 C36 32 48 20 60 20 C72 20 84 32 82 48 C75 35 68 32 60 32 C52 32 45 35 38 48 Z" fill="#0D1117"/>
    
    <!-- Torso / Suit -->
    <path d="M20 120 C20 95 38 88 60 88 C82 88 100 95 100 120 L20 120 Z" fill="#161B22" stroke="#00C2FF" stroke-width="2"/>
    <path d="M50 88 L60 105 L70 88 Z" fill="#7C3AED"/>
    <path d="M57 95 L60 120 L63 95 Z" fill="#FFFFFF"/>
  </g>

  <!-- Status Glowing Pill -->
  <rect x="40" y="160" width="120" height="24" rx="12" fill="#0D1117" stroke="#00C2FF" stroke-width="1.5"/>
  <circle cx="54" cy="172" r="3.5" fill="#22D3EE"/>
  <text x="64" y="176" fill="#E6EDF3" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="700">SHISANK YADAV</text>
</svg>
