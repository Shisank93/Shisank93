<svg width="100%" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark Tech Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117" />
      <stop offset="50%" stop-color="#161B22" />
      <stop offset="100%" stop-color="#0D1117" />
    </linearGradient>

    <!-- Cyan Glow Gradient -->
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C2FF" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.9" />
    </linearGradient>

    <!-- Purple Neon Glow -->
    <radialGradient id="purpleGlow" cx="20%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="blueGlow" cx="80%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00C2FF" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#00C2FF" stop-opacity="0" />
    </radialGradient>

    <!-- Glow Filter -->
    <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262D" stroke-width="0.8" opacity="0.6"/>
    </pattern>
  </defs>

  <!-- Background Base -->
  <rect width="1200" height="320" rx="16" fill="url(#bgGradient)" />
  
  <!-- Cybernetic Grid Overlay -->
  <rect width="1200" height="320" rx="16" fill="url(#grid)" />

  <!-- Ambient Glow Orbs -->
  <circle cx="200" cy="160" r="220" fill="url(#purpleGlow)" />
  <circle cx="950" cy="160" r="250" fill="url(#blueGlow)" />

  <!-- Neural Network Connections & Nodes -->
  <g opacity="0.75">
    <!-- Synaptic Lines -->
    <line x1="80" y1="60" x2="160" y2="120" stroke="#00C2FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="160" y1="120" x2="110" y2="220" stroke="#7C3AED" stroke-width="1.5" opacity="0.6"/>
    <line x1="160" y1="120" x2="260" y2="150" stroke="#22D3EE" stroke-width="1.5" opacity="0.6"/>
    <line x1="260" y1="150" x2="210" y2="250" stroke="#00C2FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="260" y1="150" x2="340" y2="80" stroke="#7C3AED" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Pulsating Nodes -->
    <circle cx="80" cy="60" r="5" fill="#00C2FF" filter="url(#glowFilter)"/>
    <circle cx="160" cy="120" r="7" fill="#7C3AED" filter="url(#glowFilter)"/>
    <circle cx="110" cy="220" r="6" fill="#22D3EE" filter="url(#glowFilter)"/>
    <circle cx="260" cy="150" r="8" fill="#00C2FF" filter="url(#glowFilter)"/>
    <circle cx="210" cy="250" r="5" fill="#7C3AED" filter="url(#glowFilter)"/>
    <circle cx="340" cy="80" r="6" fill="#00C2FF" filter="url(#glowFilter)"/>
  </g>

  <!-- Left Side: Futuristic AI Avatar Badge Container -->
  <g transform="translate(60, 50)">
    <!-- Outer Glow Ring -->
    <circle cx="110" cy="110" r="95" fill="none" stroke="url(#cyanGlow)" stroke-width="3" filter="url(#glowFilter)"/>
    <circle cx="110" cy="110" r="90" fill="#161B22" stroke="#30363D" stroke-width="2"/>
    
    <!-- AI Brain Graphic Vector -->
    <path d="M85 85 C85 75, 95 65, 110 65 C125 65, 135 75, 135 85 C140 85, 145 95, 145 105 C145 115, 135 125, 130 130 C125 140, 115 145, 110 145 C105 145, 95 140, 90 130 C85 125, 75 115, 75 105 C75 95, 80 85, 85 85 Z" fill="none" stroke="#00C2FF" stroke-width="2.5" filter="url(#glowFilter)"/>
    <circle cx="110" cy="105" r="14" fill="#7C3AED" opacity="0.8"/>
    <circle cx="110" cy="105" r="6" fill="#FFFFFF"/>
    
    <!-- Status Indicator Badge -->
    <rect x="55" y="180" width="110" height="26" rx="13" fill="#0D1117" stroke="#00C2FF" stroke-width="1.5"/>
    <circle cx="70" cy="193" r="4" fill="#22D3EE"/>
    <text x="80" y="197" fill="#E6EDF3" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="700">AI ENGINEER</text>
  </g>

  <!-- Right Side: Executive Typography & Branding -->
  <g transform="translate(320, 75)">
    <!-- Name Heading -->
    <text x="0" y="40" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="900" letter-spacing="2">
      SHISANK YADAV
    </text>
    
    <!-- Role Subtitle -->
    <text x="0" y="75" fill="#00C2FF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="700" letter-spacing="3">
      AI • MACHINE LEARNING • MLOPS
    </text>

    <!-- Tagline -->
    <text x="0" y="110" fill="#C9D1D9" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="500">
      Building Intelligent Systems That Solve Real-World Problems.
    </text>

    <!-- Tech Stack Pill Row -->
    <g transform="translate(0, 135)">
      <!-- Python Pill -->
      <rect x="0" y="0" width="85" height="28" rx="6" fill="#161B22" stroke="#3776AB" stroke-width="1.5"/>
      <text x="42.5" y="18" fill="#3776AB" font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle">Python</text>

      <!-- TensorFlow Pill -->
      <rect x="95" y="0" width="110" height="28" rx="6" fill="#161B22" stroke="#FF6F00" stroke-width="1.5"/>
      <text x="150" y="18" fill="#FF6F00" font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle">TensorFlow</text>

      <!-- Flask Pill -->
      <rect x="215" y="0" width="75" height="28" rx="6" fill="#161B22" stroke="#E6EDF3" stroke-width="1.5"/>
      <text x="252.5" y="18" fill="#E6EDF3" font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle">Flask</text>

      <!-- Docker Pill -->
      <rect x="300" y="0" width="85" height="28" rx="6" fill="#161B22" stroke="#2496ED" stroke-width="1.5"/>
      <text x="342.5" y="18" fill="#2496ED" font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle">Docker</text>

      <!-- AWS Pill -->
      <rect x="395" y="0" width="70" height="28" rx="6" fill="#161B22" stroke="#FF9900" stroke-width="1.5"/>
      <text x="430" y="18" fill="#FF9900" font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle">AWS</text>
    </g>
  </g>

  <!-- Glowing Top & Bottom Accent Lines -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="url(#cyanGlow)" stroke-width="3"/>
  <line x1="0" y1="320" x2="1200" y2="320" stroke="url(#cyanGlow)" stroke-width="2" opacity="0.6"/>
</svg>
